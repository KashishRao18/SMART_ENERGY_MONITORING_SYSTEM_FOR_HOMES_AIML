<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Authentication{% endblock %} | Smart Energy</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --auth-primary: #2a6cf4;
            --auth-secondary: #16a085;
            --auth-surface: #ffffff;
            --auth-border: #dce6ff;
            --auth-text: #1e2f5c;
            --auth-muted: #5f6d93;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Manrope", "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background:
                radial-gradient(circle at 20% 20%, rgba(42, 108, 244, 0.18), transparent 38%),
                radial-gradient(circle at 80% 80%, rgba(22, 160, 133, 0.18), transparent 35%),
                linear-gradient(150deg, #eef3ff 0%, #f8fbff 45%, #eef9f5 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .auth-shell {
            width: min(100%, 980px);
            display: grid;
            grid-template-columns: 1.1fr 1fr;
            border: 1px solid rgba(220, 230, 255, 0.8);
            border-radius: 22px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.92);
            box-shadow: 0 24px 50px rgba(20, 38, 82, 0.14);
        }

        .auth-hero {
            padding: 2.2rem;
            color: #fff;
            background: linear-gradient(160deg, #2a6cf4 0%, #2441a8 60%, #12346e 100%);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .auth-hero h2 {
            font-weight: 800;
            line-height: 1.2;
        }

        .auth-badge {
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.16);
            border-radius: 999px;
            padding: 0.4rem 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.82rem;
            font-weight: 600;
        }

        .auth-panel {
            padding: 1.5rem;
            background: transparent;
        }

        .auth-card {
            width: 100%;
            max-width: 460px;
            margin: 0 auto;
            border: 1px solid var(--auth-border);
            border-radius: 18px;
            background: var(--auth-surface);
            box-shadow: 0 10px 28px rgba(23, 43, 91, 0.07);
            overflow: hidden;
        }

        .auth-header {
            background: linear-gradient(135deg, #f4f8ff 0%, #edf4ff 60%, #ebfaf6 100%);
            border-bottom: 1px solid var(--auth-border);
            color: var(--auth-text);
            padding: 1.4rem 1.5rem;
        }

        .auth-body {
            padding: 1.3rem 1.5rem 1.5rem;
        }

        .form-label {
            color: var(--auth-text);
            font-weight: 600;
            font-size: 0.92rem;
        }

        .form-control {
            border-radius: 10px;
            border: 1px solid #cfdaf7;
            min-height: 44px;
        }

        .form-control:focus {
            border-color: var(--auth-primary);
            box-shadow: 0 0 0 0.2rem rgba(42, 108, 244, 0.15);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--auth-primary), #274fcf);
            border: none;
            border-radius: 10px;
            font-weight: 700;
            min-height: 44px;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #245fdd, #233fa5);
        }

        .helper-text, .helper-text a {
            color: var(--auth-muted);
            font-size: 0.9rem;
        }

        .helper-text a {
            color: var(--auth-primary);
            text-decoration: none;
            font-weight: 600;
        }

        @media (max-width: 900px) {
            .auth-shell {
                grid-template-columns: 1fr;
            }

            .auth-hero {
                padding: 1.4rem;
            }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="auth-shell">
        <section class="auth-hero">
            <div>
                <div class="auth-badge mb-3"><i class="fas fa-shield-heart"></i> Secure Access</div>
                <h2 class="mb-2">Smart Energy Monitoring</h2>
                <p class="mb-0 text-white-50">AI-driven insights, anomaly alerts, and prediction workflows.</p>
            </div>
            <small class="text-white-50 mt-4">Production-ready authentication and account recovery flows.</small>
        </section>
        <section class="auth-panel d-flex align-items-center">
            <div class="w-100">
                {% block content %}{% endblock %}
            </div>
        </section>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
